# This workflow is configured with npm trusted publishing which allows only one workflow to be configured
# The workflow filename must be the parent that was triggered by the event and not the workflow that contains the npm publish step

name: Build

on:
  push:
    branches:
      - main

  workflow_dispatch: # manual trigger was previously in publish.yml but is moved here to support npm trusted publishing
    inputs:
      package_paths:
        description: "Publish the package in this folder"
        required: true
        type: choice
        options:
          - '["packages/personalization"]'
          - '["packages/react"]'
      npm_tag:
        description: Publish the package with npm tag
        required: true
        type: choice
        default: latest
        options:
          - latest
          - prerelease
      release:
        description: "Publish the package version"
        required: true
        type: boolean

jobs:
  build:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Install dependencies
        run: npm install

      - name: Build all workspace packages
        run: npm run build

      - name: Make local packages
        run: cd packages && npm pack --workspace ./**

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contensis-personalization-packages
          path: ./packages/*.tgz

  cypress-e2e:
    if: github.event_name != 'workflow_dispatch'
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false # don't fail the entire matrix on failure
      matrix:
        browser: ["chrome", "edge", "firefox"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Use Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20.x"

      - name: Run Cypress tests for all workspace packages
        uses: cypress-io/github-action@v6
        env:
          CYPRESS_RECORD_KEY: ${{ secrets.CYPRESS_RECORD_KEY }}
          # using localhost with https avoiding `Error: self-signed certificate`
          NODE_TLS_REJECT_UNAUTHORIZED: 0
        with:
          build: npm run build
          start: npm start
          wait-on: "https://localhost:5173"
          browser: ${{ matrix.browser }}
          # Records to Cypress Cloud
          # https://docs.cypress.io/guides/cloud/projects#Set-up-a-project-to-record
          record: true

      # after the test run completes store videos and any screenshots
      - name: Upload screenshots for any failed tests
        uses: actions/upload-artifact@v4
        # add the line below to store screenshots only on failures
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots

      - name: Upload videos for any failed tests
        uses: actions/upload-artifact@v4
        if: failure()
        with:
          name: cypress-videos
          path: cypress/videos

