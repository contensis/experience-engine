name: Node.js build

on:
  push:
    branches:
      - main

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Cypress install
        uses: cypress-io/github-action@v6
        with:
          # Disable running of tests within install job
          runTests: false
          build: npm run build

      - name: Save build folder
        uses: actions/upload-artifact@v4
        with:
          name: build
          if-no-files-found: error
          path: packages/**/dist/*

      - name: Make local packages
        run: cd packages && npm pack --workspace ./**

      - name: Upload packaged artifacts
        uses: actions/upload-artifact@v4
        with:
          name: contensis-personalization-packages
          path: ./packages/*.tgz

  cypress-run:
    runs-on: ubuntu-latest
    needs: build

    strategy:
      fail-fast: false # don't fail the entire matrix on failure
      matrix:
        browser: ["chrome", "edge", "firefox"]

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download the build folder
        uses: actions/download-artifact@v4
        with:
          name: build

      - name: Run Cypress tests for all workspace packages
        uses: cypress-io/github-action@v6
        with:
          start: npm start
          wait-on: "https://localhost:5178"
          browser: ${{ matrix.browser }}

      # after the test run completes store videos and any screenshots
      - uses: actions/upload-artifact@v4
        # add the line below to store screenshots only on failures
        if: failure()
        with:
          name: cypress-screenshots
          path: cypress/screenshots
          if-no-files-found: ignore # 'warn' or 'error' are also available, defaults to `warn`

      - uses: actions/upload-artifact@v4
        # if: failure()
        with:
          name: cypress-videos
          path: cypress/videos
          if-no-files-found: ignore # 'warn' or 'error' are also available, defaults to `warn`
