<!DOCTYPE html>
<html>
  <head>
    <meta charset="UTF-8" />
    <title>Static HTML Home Page</title>
    <script type="module">
      /** Initialise the CONTENSIS_XP object in global context so we can specify options */
      if (!window.CONTENSIS_XP)
        window.CONTENSIS_XP = {};

      if (!window.CONTENSIS_XP.context)
        // Fetch a hard-coded manifest from test fixtures
        fetch("/../../cypress/fixtures/signals.page.path-manifest.json")
          .then((response) => response.json())
          .then((json) => {
            console.log(
              `HTML app fetched manifest json ${json.version.versionNo}`
            );

            // Output console logs and extra info
            window.CONTENSIS_XP.debug = true;

            // Use the manifest we have just fetched
            window.CONTENSIS_XP.manifest = json;

            // Boilerplate to get active audiences
            const getAudiences = (context) =>
              (window.CONTENSIS_XP?.context || context)?.state
                .audiences?.active || [];

            let personalised = []; // Keep track of audiences we've made personalisations for

            /** Render personalised content for any audiences we have activated */
            const personalise = (context) => {
              const audiences = getAudiences(context);

              if (audiences.length !== personalised.length) {
                const personalisedElement = document.createElement("p");
                personalisedElement.setAttribute(
                  "id",
                  `personalised-audiences-${audiences.join("-")}`
                );
                personalisedElement.innerHTML = `Personalised content for ${audiences.join(
                  ", "
                )} audience${audiences.length > 1 ? "s" : ""}`;

                document.body.appendChild(personalisedElement);
                personalised.push(...audiences);
              }
            };

            /** Remove personalised content we've added */
            const cleanup = () => {
              const existingElement = document.querySelector(
                `#personalised-audiences-${personalised.join("-")}`
              );
              if (existingElement) document.body.removeChild(existingElement);
            };

            /** Trigger personalisatons after specific events by setting handlers */

            // Render personalisations based on any previously active audiences
            window.CONTENSIS_XP.onInit = personalise;

            // Update personalised content if we matched a new audience by visiting this page
            window.CONTENSIS_XP.onPageView = () => {
              const audiences = getAudiences();
              if (audiences.length !== personalised.length) {
                cleanup();
                personalise();
              }
            };

            // Import our helper script to embed a script tag
            // that creates a personalisation context
            import("/../../apps/html/experience-engine.js").then(() => {
               console.log(`HTML app imported experience-engine.js script`);
            });
          });
    </script>
  </head>
  <body>
    <h1>Home page</h1>
    <p>Welcome to the static example site</p>
    <ul>
      <li><a href="page1.html">Navigate to Page 1</a></li>
      <li><a href="arts/index.html">Navigate to Arts home page</a></li>
      <li><a href="entry-content.html">Navigate to Entry content page</a></li>
      <li>
        <a href="custom-attributes.html">Navigate to Custom attributes page</a>
      </li>
      <li><a href="experiment-content.html">Navigate to Experiment page</a></li>
    </ul>
  </body>
</html>
